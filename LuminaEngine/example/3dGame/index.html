<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Engine - 3D Game Example</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #ui-container { position: absolute; top: 10px; left: 10px; color: white; font-family: monospace; background-color: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; user-select: none; }
        #instructions { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: Arial, sans-serif; text-align: center; background-color: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div id="ui-container">
        <div id="fps-display">FPS: 0</div>
        <div id="coords-display"></div>
    </div>
    <div id="instructions">
        <p>Click to start</p>
        <p>WASD - Move | SPACE - Jump | MOUSE - Look</p>
    </div>

    <!-- 
      ВАЖНО: Import Map
      Это карта, которая говорит браузеру:
      - "three" на самом деле ссылка на CDN.
      - Все, что начинается с "engine/", нужно искать в папке ../../engine/
    -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js",
        "engine/": "../../engine/"
      }
    }
    </script>

    <!-- Подключаем основной скрипт игры. Он находится рядом с этим html. -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
