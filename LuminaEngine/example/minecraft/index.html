<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LuminaCraft</title>
    <link rel="icon" href="img/le.png">
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Minecraftia', sans-serif; background: #111; color: white; }
        canvas { display: block; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: white; border: 1px solid black; transform: translate(-50%, -50%); }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.4); border: 2px solid #555; }
        .hotbar-slot { width: 50px; height: 50px; border: 2px solid #888; margin: 2px; background-size: cover; background-position: center; image-rendering: pixelated; position: relative; }
        .hotbar-slot.selected { border-color: white; transform: scale(1.1); }
        .hotbar-slot.held { border-color: #ffcc00; box-shadow: 0 0 6px #ffcc00; }
        #inventory .hotbar-slot { cursor: pointer; pointer-events: all; }
        .item-count { position: absolute; bottom: 2px; right: 2px; font-size: 14px; text-shadow: 1px 1px 2px black; }
        #inventory { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 462px; background: rgba(10,10,10,0.8); border: 3px solid #555; padding: 10px; display: none; pointer-events: all; }
        .inventory-grid { display: grid; grid-template-columns: repeat(9, 50px); gap: 2px; }
        #debug-info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 5px; font-size: 12px; line-height: 1.2; }
        .menu-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #333; display: none; flex-direction: column; justify-content: center; align-items: center; pointer-events: all; }
        .menu-screen.active { display: flex; }
        .menu-screen h1 { font-size: 48px; margin-bottom: 20px; }
        .menu-screen button { font-size: 22px; padding: 10px 20px; margin: 6px; cursor: pointer; }
        .menu-screen label { font-size: 18px; margin: 8px; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
        .menu-screen input[type="text"] { font-size: 18px; padding: 6px; width: 280px; }
        .menu-row { display: flex; }
        #world-list { display: flex; flex-direction: column; gap: 8px; max-height: 50vh; overflow-y: auto; margin-bottom: 16px; min-width: 480px; }
        #world-list .empty-hint { opacity: 0.7; padding: 20px; }
        .world-entry { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.08); padding: 10px 14px; border-radius: 4px; gap: 12px; }
        .world-entry .world-info { text-align: left; }
        .world-entry .world-info .world-name { font-size: 18px; font-weight: bold; }
        .world-entry .world-info .world-meta { font-size: 12px; opacity: 0.7; }
        .world-entry .world-actions button { font-size: 14px; padding: 6px 10px; margin: 0 0 0 4px; }
        #instructions {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.5);
            color: white;
            text-align: center;
            font-size: 1.5em;
            display: none; /* Initially hidden */
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div id="ui-container">
        <div id="debug-info">
            <div id="fps-display">FPS: 0</div>
            <div id="coords-display"></div>
        </div>
        <div id="crosshair"></div>
        <div id="hotbar"></div>
        <div id="inventory">
            <div class="inventory-grid" id="main-inventory-grid"></div>
            <hr>
            <div class="inventory-grid" id="hotbar-inventory-grid"></div>
        </div>
    </div>
    <div id="screen-main" class="menu-screen active">
        <h1>LuminaCraft</h1>
        <button id="play-btn">Играть</button>
        <button id="settings-btn">Настройки</button>
    </div>

    <div id="screen-worlds" class="menu-screen">
        <h1>Выбор мира</h1>
        <div id="world-list"></div>
        <div class="menu-row">
            <button id="create-world-btn">Создать новый мир</button>
            <button id="worlds-back-btn">Назад</button>
        </div>
    </div>

    <div id="screen-create-world" class="menu-screen">
        <h1>Новый мир</h1>
        <label>Название
            <input id="new-world-name" type="text" maxlength="40">
        </label>
        <label>Сид (необязательно)
            <input id="new-world-seed" type="text" placeholder="оставь пустым для случайного">
        </label>
        <div class="menu-row">
            <button id="confirm-create-world-btn">Создать</button>
            <button id="create-world-back-btn">Назад</button>
        </div>
    </div>

    <div id="screen-settings" class="menu-screen">
        <h1>Настройки</h1>
        <label>Чувствительность мыши: <span id="mouse-sensitivity-value"></span>
            <input id="mouse-sensitivity-slider" type="range" min="0.0005" max="0.005" step="0.0001">
        </label>
        <button id="settings-back-btn">Назад</button>
    </div>
    <div id="instructions">
        <p>Игра на паузе</p>
        <p>(Нажмите, чтобы продолжить)</p>
    </div>

    <!-- Загрузчик THREE.js (можно скачать или использовать CDN) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <!-- Основной скрипт игры -->
    <script type="module" src="Lumina/js/main.js"></script>
</body>
</html>
