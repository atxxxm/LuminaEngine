<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaEngine - Maze Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
        .ui-overlay {
            position: absolute; color: white; font-family: monospace;
            font-size: 16px; text-shadow: 1px 1px 2px black; pointer-events: none;
        }
        #coords-display { top: 10px; right: 10px; }
        #fps-display { top: 30px; right: 10px; }
        #coin-counter { top: 10px; left: 10px; font-size: 24px; color: #FFD700; }
        
        .center-screen {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: white;
            background-color: rgba(0,0,0,0.75);
            padding: 30px; border-radius: 15px; text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        #instructions { font-size: 24px; }
        
        /* Блок для результатов */
        #results-screen {
            display: none; /* Скрыто по умолчанию */
            flex-direction: column;
            align-items: center;
            gap: 20px; /* Расстояние между элементами */
            pointer-events: auto; /* Разрешаем клики по этому блоку */
        }
        #results-screen h2 {
            font-size: 48px;
            font-weight: bold;
            color: #4CAF50;
            margin: 0;
        }
        #results-screen p {
            font-size: 20px;
            margin: 5px 0;
        }
        .button-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        #results-screen button {
            font-size: 18px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            background-color: #007bff;
            transition: background-color 0.3s;
        }
        #results-screen button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <!-- Игровые оверлеи -->
    <div id="coords-display" class="ui-overlay"></div>
    <div id="fps-display" class="ui-overlay"></div>
    <div id="coin-counter" class="ui-overlay"></div>
    
    <!-- Инструкции в начале -->
    <div id="instructions" class="center-screen">Соберите все монеты и найдите выход!</div>
    
    <!-- Экран результатов в конце -->
    <div id="results-screen" class="center-screen">
        <h2 id="results-title">ЛАБИРИНТ ПРОЙДЕН!</h2>
        <div class="stats">
            <p id="final-coins">Монет собрано: 0 / 0</p>
            <p id="final-time">Время: 0.00 секунд</p>
        </div>
        <div class="button-container">
            <button id="restart-button">Повторить</button>
            <button id="new-maze-button">Новый лабиринт (больше)</button>
        </div>
    </div>
    
    <!-- Холст для рендеринга -->
    <canvas id="lumina-canvas"></canvas>

    <!-- Подключение скриптов -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
    <script type="module" src="./Maze.js"></script>
</body>
</html>
